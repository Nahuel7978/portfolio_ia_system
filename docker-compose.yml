version: '3.8'

services:
  # 1. Base de Datos Relacional
  postgres:
    image: postgres:15-alpine
    container_name: db-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-network

  # 2. Base de Datos Vectorial
  chromadb:
    image: chromadb/chroma:latest
    container_name: db-chroma
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "${CHROMA_PORT}:8000"
    networks:
      - portfolio-network

  # 3. Web Core (Spring Boot - Base)
  web-core:
    image: eclipse-temurin:17-jdk-alpine
    container_name: app-web-core
    working_dir: /app
    volumes:
      - ./web-core:/app
    command: tail -f /dev/null
    networks:
      - portfolio-network
    depends_on:
      - postgres

  # 4. AI Core (FastAPI - Base)
  ai-core:
    image: python:3.10-slim
    container_name: app-ai-core
    working_dir: /app
    volumes:
      - ./ai-core:/app
    command: tail -f /dev/null
    networks:
      - portfolio-network
    depends_on:
      - chromadb

  # 5. Frontend (Angular - Base)
  frontend:
    image: node:20-alpine
    container_name: app-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: tail -f /dev/null
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
