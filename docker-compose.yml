version: '3.8'

services:
  # 1. Base de Datos Relacional
  postgres:
    image: postgres:15-alpine
    container_name: db-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-network

  # 2. Base de Datos Vectorial
  chromadb:
    image: chromadb/chroma:latest
    container_name: db-chroma
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "${CHROMA_PORT}:8000"
    networks:
      - portfolio-network

  # 3. Web Core (Spring Boot - Base)
  web-core:
    image: eclipse-temurin:17-jdk-alpine
    container_name: app-web-core
    working_dir: /app
    volumes:
      - ./web-core:/app
    command: tail -f /dev/null
    networks:
      - portfolio-network
    depends_on:
      - postgres

  # 4. AI Core (FastAPI - Base)
  ai-core:
    build: 
      context: ./ai-core
      dockerfile: Dockerfile
    container_name: app-ai-core
    ports:
      - "8001:8001" # <- Corregido: Host 8001 hacia Contenedor 8001
    volumes:
      - ./ai-core:/app # <- Montaje de tu código fuente en tiempo real
    command: ["uvicorn", "src.API.api_main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"] # <- Añadido: Flag --reload
    environment:
      - CHROMA_HOST=db-chroma
      - CHROMA_PORT=8000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      # Añadiremos el internal secret más adelante
    networks:
      - portfolio-network
    depends_on:
      - chromadb

networks:
  portfolio-network:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
