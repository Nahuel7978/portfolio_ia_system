spring:
  app:
    jwt:
      secret: ${JWT_SECRET}
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate # Crucial: Hibernate NO debe modificar el esquema, Flyway es el dueño
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  # Configuración de Integración con AI Core
  ai-core:
    # Usamos el nombre del contenedor y el puerto interno (8000)
    upsert-url: ${FASTAPI_URL}
    internal-secret: ${X_INTERNAL_SECRET}
